name: Deploy Hula Hoop to Production 🚀

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Código 📂
        uses: actions/checkout@v4

      - name: Instalar Bun ⚡
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache de Dependencias 💾
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Instalar Dependencias 🛠️
        run: bun install --frozen-lockfile

      - name: Compilar Proyecto (Angular SSR) 📦
        run: bun run build

      - name: Verificar artefactos del build 🔍
        run: |
          echo "=== Estructura dist/ ==="
          ls -la dist/hula-hoop/
          ls -la dist/hula-hoop/server/
          echo "=== server.mjs existe ===" && test -f dist/hula-hoop/server/server.mjs && echo "OK" || echo "FALTANTE"

      - name: Empaquetar build para transferencia 📦
        run: |
          tar -czf deploy-package.tar.gz \
            dist/ \
            ecosystem.config.js \
            package.json \
            tools/printer-bridge.js

      - name: Subir paquete al VPS (SCP) 📤
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy-package.tar.gz"
          target: "/var/www/hula-hoop"

      - name: Diagnóstico de entorno VPS 🔍
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "HOME=$HOME"
            echo "USER=$(whoami)"
            echo "PATH=$PATH"
            echo "--- bun locations ---"
            find /root /home /usr/local /usr -name bun -type f 2>/dev/null || true
            echo "--- pm2 locations ---"
            find /root /home /usr/local /usr -name pm2 -type f 2>/dev/null || true
            echo "--- which ---"
            which bun 2>/dev/null || echo "bun: not in PATH"
            which pm2 2>/dev/null || echo "pm2: not in PATH"

      - name: Desplegar y reiniciar servicios en VPS 🔄
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            # Locate bun regardless of install path
            BUN_BIN=$(find /root /home /usr/local/bin /usr/bin -name bun -type f 2>/dev/null | head -1)
            if [ -z "$BUN_BIN" ]; then
              echo "ERROR: bun executable not found on this server"
              exit 1
            fi
            export PATH="$(dirname "$BUN_BIN"):/usr/local/bin:$PATH"
            echo "✓ bun found at: $BUN_BIN"

            # Locate pm2 (may be a symlink or script)
            PM2_BIN=$(find /root /home /usr/local/bin /usr/bin -name pm2 2>/dev/null | head -1)
            if [ -n "$PM2_BIN" ]; then
              export PATH="$(dirname "$PM2_BIN"):$PATH"
              echo "✓ pm2 found at: $PM2_BIN"
            fi

            cd /var/www/hula-hoop

            echo "→ Extrayendo paquete..."
            tar -xzf deploy-package.tar.gz --overwrite
            rm -f deploy-package.tar.gz

            echo "→ Instalando dependencias de producción..."
            bun install --production

            echo "→ Reiniciando servicios PM2..."
            pm2 startOrRestart ecosystem.config.js --env production

            echo "→ Guardando estado PM2..."
            pm2 save

            echo "✓ Deploy completado"
            pm2 list
