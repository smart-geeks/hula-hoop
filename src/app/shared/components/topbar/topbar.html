<header class="fixed top-0 left-0 right-0 z-50 bg-white/95 backdrop-blur-md border-b border-gray-100">
  <nav
    class="mx-auto flex items-center justify-between px-4 sm:px-6 lg:px-8 h-20 max-w-7xl"
    aria-label="Navegación principal"
  >
    <!-- Logo -->
    <a routerLink="/" class="flex items-center shrink-0" aria-label="Ir al inicio de Hula Hoop">
      <img
        src="https://jzdfxbbnhkzdetrpmqdx.supabase.co/storage/v1/object/public/general/logo.png"
        alt="Hula Hoop"
        class="h-14 w-auto"
      />
    </a>

    <!-- Desktop nav -->
    <div class="hidden lg:flex items-center gap-1">
      <a
        routerLink="/galeria"
        class="px-4 py-2 text-sm font-semibold text-gray-700 rounded-lg transition-colors hover:bg-gray-100 hover:text-rojo-brillante"
      >
        Galería
      </a>
      @if (isLoggedIn()) {
        <a
          routerLink="/mi-cuenta/reservas"
          class="px-4 py-2 text-sm font-semibold text-gray-700 rounded-lg transition-colors hover:bg-gray-100 hover:text-rojo-brillante"
        >
          Mi cuenta
        </a>

        @if (isAdmin()) {
          <a
            routerLink="/admin"
            class="px-4 py-2 text-sm font-semibold text-gray-700 rounded-lg transition-colors hover:bg-gray-100 hover:text-morado"
          >
            Admin
          </a>
        }
      }
    </div>

    <!-- Desktop actions -->
    <div class="hidden lg:flex items-center gap-3">
      @if (isLoggedIn()) {
        <p-button
          label="Cerrar sesión"
          icon="pi pi-sign-out"
          severity="secondary"
          [text]="true"
          size="small"
          (click)="onLogout()"
        />
      } @else {
        <p-button
          label="Iniciar sesión"
          severity="help"
          [rounded]="true"
          (click)="onLogin()"
        />
      }

      <p-button
        label="Reservar fiesta"
        [rounded]="true"
        (click)="onBookParty()"
      />
    </div>

    <!-- Mobile actions -->
    <div class="flex lg:hidden items-center gap-2">
      <p-button
        label="Reservar"
        [rounded]="true"
        size="small"
        (click)="onBookParty()"
      />
      <p-button
        icon="pi pi-bars"
        severity="secondary"
        [text]="true"
        [rounded]="true"
        (click)="drawerVisible.set(true)"
        aria-label="Abrir menú"
        [attr.aria-expanded]="drawerVisible()"
        aria-controls="mobile-menu-drawer"
      />
    </div>
  </nav>
</header>

<!-- Mobile drawer -->
<p-drawer
  [(visible)]="drawerVisible"
  position="right"
  [blockScroll]="true"
  styleClass="!w-72"
  id="mobile-menu-drawer"
  ariaCloseLabel="Cerrar menú"
>
  <ng-template #header>
    <img
      src="https://jzdfxbbnhkzdetrpmqdx.supabase.co/storage/v1/object/public/general/logo.png"
      alt="Hula Hoop"
      class="w-40 object-contain"
    />
  </ng-template>

  <div class="flex flex-col gap-1 py-2">
    <a
      routerLink="/reservar/fiesta-privada"
      class="flex items-center gap-3 px-4 py-3 text-gray-700 font-semibold rounded-lg transition-colors hover:bg-gray-100"
      (click)="drawerVisible.set(false)"
    >
      <i class="pi pi-star" aria-hidden="true"></i>
      Reservar fiesta
    </a>
    <a
      routerLink="/reservar/play-day"
      class="flex items-center gap-3 px-4 py-3 text-gray-700 font-semibold rounded-lg transition-colors hover:bg-gray-100"
      (click)="drawerVisible.set(false)"
    >
      <i class="pi pi-users" aria-hidden="true"></i>
      Reservar Play Day
    </a>
    <a
      routerLink="/galeria"
      class="flex items-center gap-3 px-4 py-3 text-gray-700 font-semibold rounded-lg transition-colors hover:bg-gray-100"
      (click)="drawerVisible.set(false)"
    >
      <i class="pi pi-images" aria-hidden="true"></i>
      Galería
    </a>

    @if (isLoggedIn()) {
      <hr class="my-2 border-gray-200" />
      <a
        routerLink="/mi-cuenta/reservas"
        class="flex items-center gap-3 px-4 py-3 text-gray-700 font-semibold rounded-lg transition-colors hover:bg-gray-100"
        (click)="drawerVisible.set(false)"
      >
        <i class="pi pi-user" aria-hidden="true"></i>
        Mi cuenta
      </a>

      @if (isAdmin()) {
        <a
          routerLink="/admin"
          class="flex items-center gap-3 px-4 py-3 text-gray-700 font-semibold rounded-lg transition-colors hover:bg-gray-100"
          (click)="drawerVisible.set(false)"
        >
          <i class="pi pi-shield" aria-hidden="true"></i>
          Administrador
        </a>
      }
    }
  </div>

  <ng-template #footer>
    @if (isLoggedIn()) {
      <p-button
        label="Cerrar sesión"
        icon="pi pi-sign-out"
        severity="danger"
        [text]="true"
        styleClass="w-full"
        (click)="onLogout(); drawerVisible.set(false)"
      />
    } @else {
      <p-button
        label="Iniciar sesión"
        severity="help"
        styleClass="w-full"
        (click)="onLogin(); drawerVisible.set(false)"
      />
    }
  </ng-template>
</p-drawer>

<app-auth-dialog />
