@if (venue.venues().length > 1) {
  <div class="relative venue-switcher-root">
    <button
      (click)="toggle()"
      [attr.aria-expanded]="open()"
      aria-haspopup="listbox"
      aria-label="Cambiar salón activo"
      class="flex items-center gap-2 px-3 py-2 rounded-xl bg-slate-50 border border-slate-200 text-slate-700 hover:bg-slate-100 hover:border-slate-300 transition-all text-sm max-w-[200px]"
    >
      <i class="pi pi-building text-slate-500 shrink-0"></i>
      <span class="truncate font-medium">
        {{ venue.currentVenue()?.nombre ?? 'Seleccionar salón' }}
      </span>
      <i
        class="pi pi-chevron-down text-xs text-slate-400 shrink-0 transition-transform duration-200"
        [class.rotate-180]="open()"
      ></i>
    </button>

    @if (open()) {
      <ul
        role="listbox"
        aria-label="Salones disponibles"
        class="absolute top-full left-0 mt-1 z-50 min-w-[200px] bg-white border border-slate-200 rounded-xl shadow-lg py-1 overflow-hidden"
      >
        @for (v of venue.venues(); track v.id) {
          <li role="option" [attr.aria-selected]="v.id === venue.currentVenueId()">
            <button
              (click)="select(v.id)"
              class="w-full flex items-center gap-2.5 px-3 py-2.5 text-sm text-left hover:bg-slate-50 transition-colors"
              [class.text-rojo-brillante]="v.id === venue.currentVenueId()"
              [class.font-semibold]="v.id === venue.currentVenueId()"
              [class.text-slate-700]="v.id !== venue.currentVenueId()"
            >
              <i
                class="pi pi-building text-xs shrink-0"
                [class.text-rojo-brillante]="v.id === venue.currentVenueId()"
                [class.text-slate-400]="v.id !== venue.currentVenueId()"
              ></i>
              <span class="truncate">{{ v.nombre }}</span>
              @if (v.id === venue.currentVenueId()) {
                <i class="pi pi-check text-xs ml-auto text-rojo-brillante shrink-0"></i>
              }
            </button>
          </li>
        }
      </ul>
    }
  </div>
}
