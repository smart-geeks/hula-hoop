<section class="relative min-h-[441px] md:min-h-[83.2vh] overflow-x-clip">

  <!-- Logo: top right -->
  <div class="absolute top-6 right-4 md:top-10 md:right-12 z-10 hero-logo-wrap">
    <img
      ngSrc="https://jzdfxbbnhkzdetrpmqdx.supabase.co/storage/v1/object/public/Personajes/logo.png"
      alt="Hula Hoop — Playground Infantil"
      width="1366"
      height="768"
      priority
      class="w-[22.8rem] md:w-[32rem] lg:w-[48rem] h-auto object-contain pixel-float"
    />
  </div>

  <!-- Composición planeta + astronauta -->
  <!-- Mobile: centrado (~110vw), Desktop: grande y desplazado a la izquierda -->
  <div
    class="absolute left-1/2 pointer-events-none hero-planet-wrap z-0"
    style="bottom: 0;"
    aria-hidden="true"
  >
    <!-- Planeta cuadrado 1:1 -->
    <div class="relative w-full" style="padding-top: 100%;">
      <img
        ngSrc="https://jzdfxbbnhkzdetrpmqdx.supabase.co/storage/v1/object/public/Personajes/planeta.png"
        alt=""
        fill
        priority
        class="object-contain"
      />
      <!-- Astronauta: sobre el borde superior del planeta -->
      <img
        src="https://jzdfxbbnhkzdetrpmqdx.supabase.co/storage/v1/object/public/Personajes/astronauta.png"
        alt=""
        class="absolute w-[30%] h-auto object-contain"
        style="top: 20%; left: 33%;"
      />
    </div>
  </div>

</section>
