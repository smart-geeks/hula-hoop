<!-- Divisor superior: sobre nosotros → amarillo contacto -->
<!-- El div tiene bg amarillo, el SVG dibuja el blanco/grid por encima -->
<div class="relative z-20 w-full overflow-visible leading-none mb-[-2px]" style="background-color: #F6F090;" aria-hidden="true">
  <div class="absolute top-[-1px] inset-x-0 h-[3px] bg-white pointer-events-none z-10"></div>
  <svg viewBox="0 0 1440 100" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none"
    class="relative z-20 w-full h-16 md:h-24 block">
    <path d="M0,0 Q360,100 720,50 Q1080,0 1440,80 L1440,0 Z" fill="white" />
  </svg>
</div>

<section id="contacto" class="relative overflow-hidden px-6 py-16 sm:py-20" style="background-color: #F6F090; scroll-margin-top: 6rem;">

  <!-- Textura de fondo -->
  <img
    src="https://jzdfxbbnhkzdetrpmqdx.supabase.co/storage/v1/object/public/general/fondo-footer.png"
    alt=""
    aria-hidden="true"
    class="pointer-events-none absolute inset-0 w-full h-full object-cover mix-blend-multiply opacity-60 z-0"
  />

  <div class="relative mx-auto max-w-4xl text-center z-10">
    <h2 class="font-bubblegum text-7xl md:text-9xl lg:text-[10rem] font-black uppercase tracking-wide" style="color: #686ABB;">
      Contacto
    </h2>

    <div class="mt-8 flex flex-col items-center justify-center gap-4 sm:flex-row">
      <a
        href="https://wa.me/528711234567"
        target="_blank"
        rel="noopener noreferrer"
        class="inline-flex items-center gap-2 border-2 border-lima bg-lima px-6 py-3 font-semibold text-neutro-900 transition-all hover:bg-lima/80"
      >
        <i class="pi pi-whatsapp text-lg" aria-hidden="true"></i>
        WhatsApp
      </a>
      <a
        href="tel:+528711234567"
        class="inline-flex items-center gap-2 border-2 border-neutro-300 bg-white px-6 py-3 font-semibold text-neutro-700 transition-all hover:border-morado hover:text-morado"
      >
        <i class="pi pi-phone text-lg" aria-hidden="true"></i>
        871 123 4567
      </a>
    </div>

    <!-- Horarios + Dirección -->
    <div class="mt-8 flex flex-col items-center justify-center gap-4 font-body font-bold text-gray-700 text-base md:text-lg">

      <!-- Horario 1 -->
      <div class="flex items-center gap-3">
        <i class="pi pi-clock text-xl" style="color: #686ABB;" aria-hidden="true"></i>
        <span>Lun &ndash; Vie: 4:00 PM &ndash; 7:00 PM</span>
      </div>

      <!-- Horario 2 -->
      <div class="flex items-center gap-3">
        <i class="pi pi-clock text-xl" style="color: #686ABB;" aria-hidden="true"></i>
        <span>Sáb &ndash; Dom: 9:30 AM &ndash; 6:30 PM</span>
      </div>

      <!-- Direccion -->
      <a
        href="https://maps.google.com/?q=Edificio+Feliciano+Chabot+1645,Torreon,Coahuila"
        target="_blank"
        rel="noopener noreferrer"
        class="flex items-center gap-3 transition-opacity hover:opacity-70"
      >
        <i class="pi pi-map-marker text-xl" style="color: #E30D1C;" aria-hidden="true"></i>
        <span class="uppercase tracking-wider underline underline-offset-4">Edificio Feliciano Chabot #1645</span>
      </a>

    </div>
  </div>

</section>

<!-- Divisor inferior: amarillo contacto → footer (blanco/grid) -->
<!-- El div tiene bg blanco/transparente, el SVG dibuja el amarillo por encima -->
<div class="relative z-20 w-full overflow-visible leading-none mt-[-2px]" aria-hidden="true">
  <svg viewBox="0 0 1440 100" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none"
    class="relative z-20 w-full h-16 md:h-24 block">
    <path d="M0,0 Q360,100 720,50 Q1080,0 1440,80 L1440,0 L0,0 Z" fill="#F6F090" />
  </svg>
</div>
